upstream kopabridge_api {
    # 💡 Points directly to your API container name over the internal network bridge
    server api:3000;
}

server {
    listen 80;
    server_name localhost;

    # Dynamic tuning for request handling
    client_max_body_size 10M;

    location / {
        # Forward the traffic to the upstream block defined above
        proxy_pass http://kopabridge_api;
        
        # 💡 Essential tracking headers preservation
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Keep alive connection configurations
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_cache_bypass $http_upgrade;
    }
}