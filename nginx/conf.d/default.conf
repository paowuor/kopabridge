upstream kopabridge_api {
    server api:3000;
}

# ==============================================================================
# HTTP SERVER - PORT 80 ENTRYPOINT
# ==============================================================================
server {
    listen 80;
    server_name localhost; # 💡 Replace with your domain name (e.g., api.kopabridge.com) later

    client_max_body_size 10M;

    # 💡 ACME challenge path placeholder for automated Let's Encrypt renewal checks
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # 💡 Dedicated telemetry path location block for explicit load-balancer mapping
    location /health {
        proxy_pass http://kopabridge_api/health;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Catch-all gateway router for documentation blocks and core endpoints
    location / {
        proxy_pass http://kopabridge_api;
        
        # Preservation Headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support configurations
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_cache_bypass $http_upgrade;
    }
}

