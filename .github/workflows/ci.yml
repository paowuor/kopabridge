name: Continuous Integration

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  validate-and-test:
    name: Validate, Test, and Build
    runs-on: ubuntu-latest

    # 💡 Tell GitHub Actions to run ALL step commands inside the apps/api subdirectory by default
    defaults:
      run:
        working-directory: apps/api

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          # Pulls the full repository tree so apps/api is accessible
          sparse-checkout: '' 

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          # 💡 Point the cache engine to the correct package lock file location
          cache-dependency-path: apps/api/package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Prisma Client Engine Generation
        run: npx prisma generate

      - name: Check Formatting
        run: npm run format -- --check

      - name: Run ESLint Analyzer
        run: npm run lint
      
      - name: Validate Production Docker Build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./apps/api/Dockerfile
          push: false
          tags: kopabridge-api:latest